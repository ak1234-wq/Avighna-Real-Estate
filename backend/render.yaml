# Render blueprint for the backend API.
# In Render: New + → Blueprint → point at this repo. Or create a Web Service manually
# with the settings below. Add GEMINI_API_KEY as a secret in the dashboard.
services:
  - type: web
    name: mumbai-brief-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false # set this in the Render dashboard (secret)
      - key: FRONTEND_ORIGIN
        sync: false # set to your Vercel URL after deploying the frontend
